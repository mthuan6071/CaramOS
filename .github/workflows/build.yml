name: Build CaramOS ISO

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ISO (${{ startsWith(github.ref, 'refs/tags/v') && 'release' || 'dev' }})
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # GitHub runner có dung lượng giới hạn; ISO remaster cần nhiều disk.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso rsync wget isolinux syslinux-utils

      - name: Cache Mint ISO
        uses: actions/cache@v4
        with:
          path: linuxmint-22.3-cinnamon-64bit.iso
          key: mint-iso-22.3-cinnamon

      - name: Verify release tag matches source version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          source scripts/config.sh
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Source version: ${CARAMOS_VERSION}"
          echo "Tag version:    ${TAG_VERSION}"
          if [ "${TAG_VERSION}" != "${CARAMOS_VERSION}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match CARAMOS_VERSION=${CARAMOS_VERSION}"
            exit 1
          fi

      - name: Build CaramOS ISO
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "Building release from tag ${GITHUB_REF_NAME}"
            sudo -E ./build.sh --release
          else
            echo "Building dev ISO"
            sudo -E ./build.sh
          fi

      - name: Generate checksums
        run: sha256sum CaramOS-*.iso > SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaramOS-ISO
          path: |
            CaramOS-*.iso
            SHA256SUMS
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CaramOS-*.iso
            SHA256SUMS
          generate_release_notes: true
