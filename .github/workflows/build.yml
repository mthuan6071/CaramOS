name: Build CaramOS ISO

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ISO (${{ startsWith(github.ref, 'refs/tags/v') && 'release' || 'dev' }})
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # GitHub runner có dung lượng giới hạn; ISO remaster cần nhiều disk.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso rsync wget isolinux syslinux-utils

      - name: Cache Mint ISO
        uses: actions/cache@v4
        with:
          path: linuxmint-22.3-cinnamon-64bit.iso
          key: mint-iso-22.3-cinnamon

      - name: Verify release tag matches source version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          source scripts/config.sh
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Source version: ${CARAMOS_VERSION}"
          echo "Tag version:    ${TAG_VERSION}"
          if [ "${TAG_VERSION}" != "${CARAMOS_VERSION}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match CARAMOS_VERSION=${CARAMOS_VERSION}"
            exit 1
          fi

      - name: Build CaramOS ISO
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "Building release from tag ${GITHUB_REF_NAME}"
            sudo -E ./build.sh --release
          else
            echo "Building dev ISO"
            sudo -E ./build.sh
          fi

      - name: Generate checksums
        run: sha256sum CaramOS-*.iso > SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaramOS-ISO
          path: |
            CaramOS-*.iso
            SHA256SUMS
          retention-days: 7

      - name: Upload ISO to SourceForge
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SOURCEFORGE_USERNAME: ${{ secrets.SOURCEFORGE_USERNAME }}
          SOURCEFORGE_PROJECT: ${{ secrets.SOURCEFORGE_PROJECT }}
          SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}
        run: |
          ISO_FILE="$(ls CaramOS-*.iso | head -n 1)"
          ISO_BASENAME="$(basename "${ISO_FILE}")"

          if [ -z "${SOURCEFORGE_USERNAME}" ] || [ -z "${SOURCEFORGE_PROJECT}" ] || [ -z "${SOURCEFORGE_SSH_KEY}" ]; then
            echo "::error::GitHub Release assets are limited to about 2 GiB per file. Configure SOURCEFORGE_USERNAME, SOURCEFORGE_PROJECT, and SOURCEFORGE_SSH_KEY secrets to publish the ISO as one downloadable file on SourceForge."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SOURCEFORGE_SSH_KEY}" > ~/.ssh/sourceforge
          chmod 600 ~/.ssh/sourceforge
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts

          RELEASE_DIR="/home/frs/project/${SOURCEFORGE_PROJECT}/${GITHUB_REF_NAME}"
          cat > upload-release.sftp <<EOF
          mkdir ${RELEASE_DIR}
          cd ${RELEASE_DIR}
          put ${ISO_FILE}
          put SHA256SUMS
          EOF

          sftp -i ~/.ssh/sourceforge \
            -o IdentitiesOnly=yes \
            -b upload-release.sftp \
            "${SOURCEFORGE_USERNAME}@frs.sourceforge.net"

          DOWNLOAD_URL="https://sourceforge.net/projects/${SOURCEFORGE_PROJECT}/files/${GITHUB_REF_NAME}/${ISO_BASENAME}/download"
          CHECKSUM_URL="https://sourceforge.net/projects/${SOURCEFORGE_PROJECT}/files/${GITHUB_REF_NAME}/SHA256SUMS/download"
          python3 - <<PY
          from pathlib import Path
          import textwrap

          github_ref_name = "${GITHUB_REF_NAME}"
          iso_basename = "${ISO_BASENAME}"
          download_url = "${DOWNLOAD_URL}"
          checksum_url = "${CHECKSUM_URL}"
          sourceforge_project = "${SOURCEFORGE_PROJECT}"

          release_body = f"""
          ## Download CaramOS {github_ref_name}

          > GitHub Release cannot host the ISO directly because release assets have a
          > per-file size limit. The ISO is hosted as one complete file on SourceForge.

          <p align="center">
            <a href="{download_url}">
              <img src="https://img.shields.io/badge/Download-CaramOS%20ISO-ff6b00?style=for-the-badge&logo=linux&logoColor=white" alt="Download CaramOS ISO">
            </a>
          </p>

          - **ISO:** [{iso_basename}]({download_url})
          - **SHA256SUMS:** [SHA256SUMS]({checksum_url})
          - **SourceForge folder:** https://sourceforge.net/projects/{sourceforge_project}/files/{github_ref_name}/

          ### Verify the ISO

          ```bash
          sha256sum -c SHA256SUMS
          ```
          """

          Path("RELEASE_DOWNLOADS.md").write_text(textwrap.dedent(release_body).strip() + "\n", encoding="utf-8")
          PY

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SHA256SUMS
          body_path: RELEASE_DOWNLOADS.md
          append_body: true
          generate_release_notes: true
